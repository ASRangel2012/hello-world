# Template only — create the real secret out-of-band (sealed-secrets,
# external-secrets, or `kubectl create secret`), never commit real values.
#
# kubectl create secret generic hello-world-service-secrets -n hello-world \
#   --from-literal=DB_USERNAME=... \
#   --from-literal=DB_PASSWORD=... \
#   --from-literal=API_USERNAME=... \
#   --from-literal=API_PASSWORD=...
apiVersion: v1
kind: Secret
metadata:
  name: hello-world-service-secrets
  namespace: hello-world
type: Opaque
stringData:
  DB_USERNAME: "CHANGE_ME"
  DB_PASSWORD: "CHANGE_ME"
  API_USERNAME: "CHANGE_ME"
  API_PASSWORD: "CHANGE_ME"
