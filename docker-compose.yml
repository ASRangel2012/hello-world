services:
  app:
    build: .
    image: hello-world-service:local
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/hello
      DB_USERNAME: hello
      DB_PASSWORD: hello-local-only
      API_USERNAME: admin
      API_PASSWORD: admin-local-only
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hello
      POSTGRES_USER: hello
      POSTGRES_PASSWORD: hello-local-only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hello"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Not used by the service yet; included as the standard local cache backend.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
