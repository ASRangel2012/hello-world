services:
  app:
    build: .
    image: hello-world-service:local
    ports:
      - "8080:8080"
      - "8081:8081"   # management/actuator (prod profile)
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/hello
      DB_USERNAME: hello
      DB_PASSWORD: hello-local-only
      API_USERNAME: admin
      API_PASSWORD: admin-local-only
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hello
      POSTGRES_USER: hello
      POSTGRES_PASSWORD: hello-local-only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hello"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
