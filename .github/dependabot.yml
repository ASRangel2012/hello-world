version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      # Spring artifacts move in lockstep; one PR instead of a dozen.
      spring:
        patterns:
          - "org.springframework*"
      minor-and-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
