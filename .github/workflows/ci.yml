name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR runs; never cancel an in-flight main build/deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hello-world-service

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for Sonar blame data

      # Guards against a tampered gradle-wrapper.jar (checksum verified
      # against Gradle's published list).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.5.1'

      # Unit tests (test) + Testcontainers integration tests (integrationTest via check)
      - name: Build and verify
        run: gradle build

      - name: Static analysis (SonarQube)
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: gradle sonar -Dsonar.host.url=$SONAR_HOST_URL

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: build/libs/hello-world-service-*.jar
          retention-days: 7

  docker:
    name: Build, Scan & Push Image
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build into the local daemon first so the image is scanned BEFORE
      # anything is published; the push below reuses the same layer cache.
      - name: Build image (local, for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: '1'          # fail the pipeline on findings
          severity: CRITICAL,HIGH
          ignore-unfixed: true    # only actionable vulnerabilities

      - name: Push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"

  deploy:
    name: Deploy to Kubernetes
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # gate with required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Pin the immutable SHA tag in the manifest BEFORE applying, so a single
      # rollout happens (apply-then-set-image causes a double rollout and a
      # transient window on the mutable :latest tag).
      - name: Deploy manifests
        run: |
          sed -i "s|ghcr.io/example/hello-world-service:latest|${{ env.IMAGE_NAME }}:${{ github.sha }}|" k8s/deployment.yaml
          kubectl apply \
            -f k8s/configmap.yaml \
            -f k8s/deployment.yaml \
            -f k8s/service.yaml \
            -f k8s/ingress.yaml \
            -f k8s/pdb.yaml \
            -f k8s/hpa.yaml \
            -f k8s/networkpolicy.yaml
          kubectl rollout status deployment/hello-world-service -n hello-world --timeout=180s
