name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR runs; never cancel an in-flight main build/deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hello-world-service

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for Sonar blame data

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Unit tests (Surefire) + integration tests with Testcontainers (Failsafe)
      - name: Build and verify
        run: mvn -B verify

      - name: Static analysis (SonarQube)
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=hello-world-service
          -Dsonar.host.url=$SONAR_HOST_URL

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/hello-world-service-*.jar
          retention-days: 7

  docker:
    name: Build & Push Image
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # gate with required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Pin the immutable SHA tag in the manifest BEFORE applying, so a single
      # rollout happens (apply-then-set-image causes a double rollout and a
      # transient window on the mutable :latest tag).
      - name: Deploy manifests
        run: |
          sed -i "s|ghcr.io/example/hello-world-service:latest|${{ env.IMAGE_NAME }}:${{ github.sha }}|" k8s/deployment.yaml
          kubectl apply \
            -f k8s/configmap.yaml \
            -f k8s/deployment.yaml \
            -f k8s/service.yaml \
            -f k8s/ingress.yaml \
            -f k8s/pdb.yaml
          kubectl rollout status deployment/hello-world-service -n hello-world --timeout=180s
